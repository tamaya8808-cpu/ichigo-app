<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>収量分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid #ccc; padding:5px; text-align:center; }
th { background:#eee; }
</style>

</head>

<body>

<h2>📊 月別収量分析</h2>

<p id="total"></p>
<p id="average"></p>
<p id="tempAvg"></p>

<canvas id="chart"></canvas>

<h3>📅 月別データ一覧</h3>
<table id="table">
<tr>
<th>月</th>
<th>総収量(kg)</th>
<th>SS</th><th>S</th><th>M</th>
<th>L</th><th>2L</th><th>3L</th><th>規格外</th>
</tr>
</table>

<h3>📋 作業履歴</h3>
<div id="workList"></div>

<script>
let data = JSON.parse(localStorage.getItem("ichigo")||"[]");

let monthly = {};
let totalAll = 0;
let weightedSum = 0;
let tempSum = 0;

data.forEach(d=>{
  const month = d.date?.slice(0,7);

  if(!monthly[month]){
    monthly[month] = {SS:0,S:0,M:0,L:0,LL:0,LLL:0,NG:0};
  }

  monthly[month].SS += d.ss;
  monthly[month].S += d.s;
  monthly[month].M += d.m;
  monthly[month].L += d.l;
  monthly[month].LL += d.ll;
  monthly[month].LLL += d.lll;
  monthly[month].NG += d.ng;

  totalAll += d.ss+d.s+d.m+d.l+d.ll+d.lll+d.ng;

  weightedSum += 
    d.ss*1 + d.s*2 + d.m*3 + d.l*4 + d.ll*5 + d.lll*6;

  tempSum += d.temp;
});

// ソート
const labels = Object.keys(monthly).sort();

// 総収量kg
const totalKg = (totalAll / 1000).toFixed(2);

document.getElementById("total").innerText =
"総収量: " + totalKg + " kg";

let avgSize = totalAll ? (weightedSum/totalAll).toFixed(2) : 0;
document.getElementById("average").innerText =
"平均サイズ指数: " + avgSize;

let avgTemp = data.length ? (tempSum/data.length).toFixed(1) : 0;
document.getElementById("tempAvg").innerText =
"平均ハウス内気温: " + avgTemp + "℃";

// グラフ
const datasets = ["SS","S","M","L","LL","LLL","NG"].map(size=>({
  label:size,
  data:labels.map(m=> (monthly[m][size]/1000).toFixed(2))
}));

new Chart(document.getElementById("chart"),{
  type:"bar",
  data:{ labels, datasets }
});

// 🔥 月別テーブル
const table = document.getElementById("table");

labels.forEach(m=>{
  const row = document.createElement("tr");

  const totalMonth =
    monthly[m].SS+monthly[m].S+monthly[m].M+
    monthly[m].L+monthly[m].LL+monthly[m].LLL+monthly[m].NG;

  row.innerHTML = `
    <td>${m}</td>
    <td>${(totalMonth/1000).toFixed(2)}</td>
    <td>${(monthly[m].SS/1000).toFixed(2)}</td>
    <td>${(monthly[m].S/1000).toFixed(2)}</td>
    <td>${(monthly[m].M/1000).toFixed(2)}</td>
    <td>${(monthly[m].L/1000).toFixed(2)}</td>
    <td>${(monthly[m].LL/1000).toFixed(2)}</td>
    <td>${(monthly[m].LLL/1000).toFixed(2)}</td>
    <td>${(monthly[m].NG/1000).toFixed(2)}</td>
  `;

  table.appendChild(row);
});

// 作業履歴（新しい順）
let workHTML = "";
data.slice().reverse().forEach(d=>{
  workHTML += `<p>${d.date}（${d.user}）：${d.work || "-"}</p>`;
});
document.getElementById("workList").innerHTML = workHTML;

</script>

</body>
</html>
