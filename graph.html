<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid #ccc; padding:5px; text-align:center; }
th { background:#eee; }
</style>

</head>

<body>

<h2>📊 分析（完全版）</h2>

<p id="total"></p>
<p id="sales"></p>

<h3>📅 月別</h3>
<canvas id="monthChart"></canvas>

<h3>📆 日別</h3>
<canvas id="dayChart"></canvas>

<h3>📅 月別一覧</h3>
<table id="monthTable">
<tr><th>月</th><th>収量kg</th><th>売上</th></tr>
</table>

<h3>📆 日別一覧</h3>
<table id="dayTable">
<tr><th>日</th><th>収量kg</th></tr>
</table>

<h3>📋 作業履歴</h3>
<div id="workList"></div>

<script>
let data = JSON.parse(localStorage.getItem("ichigo")||"[]");

let monthly={}, daily={};
let totalAll=0, totalSales=0;

data.forEach(d=>{
  const m=d.date?.slice(0,7);
  const day=d.date;

  const total=d.ss+d.s+d.m+d.l+d.ll+d.lll+d.ng;

  if(!monthly[m]) monthly[m]={total:0,sales:0};
  if(!daily[day]) daily[day]=0;

  monthly[m].total+=total;
  daily[day]+=total;
  totalAll+=total;

  if(d.sales){
    d.sales.forEach(s=>{
      const sale=(s.weight/1000)*s.price;
      monthly[m].sales+=sale;
      totalSales+=sale;
    });
  }
});

const mLabels=Object.keys(monthly).sort();
const dLabels=Object.keys(daily).sort();

document.getElementById("total").innerText=
"総収量: "+(totalAll/1000).toFixed(2)+" kg";

document.getElementById("sales").innerText=
"総売上: "+totalSales.toFixed(0)+" 円";

// 月グラフ
new Chart(document.getElementById("monthChart"),{
  type:"bar",
  data:{
    labels:mLabels,
    datasets:[{
      label:"収量kg",
      data:mLabels.map(m=>monthly[m].total/1000)
    }]
  }
});

// 日グラフ
new Chart(document.getElementById("dayChart"),{
  type:"line",
  data:{
    labels:dLabels,
    datasets:[{
      label:"日別収量kg",
      data:dLabels.map(d=>daily[d]/1000)
    }]
  }
});

// 月テーブル
const mt=document.getElementById("monthTable");
mLabels.forEach(m=>{
  mt.innerHTML+=`
  <tr>
    <td>${m}</td>
    <td>${(monthly[m].total/1000).toFixed(2)}</td>
    <td>${monthly[m].sales.toFixed(0)}</td>
  </tr>`;
});

// 日テーブル
const dt=document.getElementById("dayTable");
dLabels.forEach(d=>{
  dt.innerHTML+=`
  <tr>
    <td>${d}</td>
    <td>${(daily[d]/1000).toFixed(2)}</td>
  </tr>`;
});

// 履歴
let html="";
data.slice().reverse().forEach(d=>{
  html+=`<p>${d.date}（${d.user}）：${d.work||"-"}</p>`;
});
document.getElementById("workList").innerHTML=html;

</script>

</body>
</html>
