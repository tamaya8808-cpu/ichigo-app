<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>いちご管理</title>

<style>
body { font-family:sans-serif; padding:15px; background:#f5f5f5; }
input, textarea, button { width:100%; padding:10px; margin:5px 0; }
button { background:#2e7d32; color:#fff; border:none; }
</style>
</head>

<body>

<h2>🍓 栽培管理</h2>

<input type="date" id="date">
<input type="text" id="line" placeholder="列">

<h3>ハウス内環境</h3>
<input type="number" id="temp" placeholder="ハウス内気温（℃）">
<input type="number" id="humidity" placeholder="湿度">

<h3>収量（g）</h3>
<input type="number" id="ss" placeholder="SS">
<input type="number" id="s" placeholder="S">
<input type="number" id="m" placeholder="M">
<input type="number" id="l" placeholder="L">
<input type="number" id="ll" placeholder="2L">
<input type="number" id="lll" placeholder="3L">
<input type="number" id="ng" placeholder="規格外">

<h3>作業内容</h3>
<textarea id="work" placeholder="例：摘果・防除・換気調整など"></textarea>

<button onclick="save()">保存</button>

<button onclick="location.href='graph.html'">
📊 グラフを見る
</button>

<button onclick="resetData()" style="background:red;">
全削除
</button>

<script>
let data = JSON.parse(localStorage.getItem("ichigo")||"[]");

function save(){

  if(!date.value){
    alert("日付入れて");
    return;
  }

  const d={
    date:date.value,
    line:line.value,
    temp:Number(temp.value)||0,
    humidity:Number(humidity.value)||0,
    ss:Number(ss.value)||0,
    s:Number(s.value)||0,
    m:Number(m.value)||0,
    l:Number(l.value)||0,
    ll:Number(ll.value)||0,
    lll:Number(lll.value)||0,
    ng:Number(ng.value)||0,
    work:work.value
  };

  data.push(d);
  localStorage.setItem("ichigo",JSON.stringify(data));

  document.querySelectorAll("input, textarea").forEach(i=>i.value="");

  alert("保存した");
}

function resetData(){
  if(confirm("全部消す？")){
    localStorage.removeItem("ichigo");
    data=[];
    alert("削除した");
  }
}
</script>

</body>
</html>
