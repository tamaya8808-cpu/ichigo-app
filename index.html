<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>いちご管理</title>

<style>
body { font-family:sans-serif; padding:15px; background:#f5f5f5; }
input, textarea, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#2e7d32; color:#fff; border:none; }
.admin { background:red; }
.box { border:1px solid #ccc; padding:10px; margin:10px 0; background:#fff; }
</style>
</head>

<body>

<h2>🍓 栽培＋販売管理（完全版）</h2>

<h3>ログイン</h3>
<input type="text" id="user" placeholder="名前">
<input type="password" id="pass" placeholder="管理者パス">

<input type="date" id="date">
<input type="text" id="line" placeholder="列">

<h3>ハウス内環境</h3>
<input type="number" id="temp" placeholder="気温（℃）" min="0">
<input type="number" id="humidity" placeholder="湿度" min="0">

<h3>収量（g）</h3>
<input type="number" id="ss" placeholder="SS" min="0">
<input type="number" id="s" placeholder="S" min="0">
<input type="number" id="m" placeholder="M" min="0">
<input type="number" id="l" placeholder="L" min="0">
<input type="number" id="ll" placeholder="2L" min="0">
<input type="number" id="lll" placeholder="3L" min="0">
<input type="number" id="ng" placeholder="規格外" min="0">

<h3>販売データ（複数OK）</h3>
<div id="salesArea"></div>
<button onclick="addSale()">＋販売追加</button>

<h3>作業内容</h3>
<textarea id="work"></textarea>

<button onclick="save()">保存</button>
<button onclick="location.href='graph.html'">📊 分析</button>
<button onclick="resetData()" class="admin">全削除（管理者のみ）</button>

<script>
let data = JSON.parse(localStorage.getItem("ichigo")||"[]");
const ADMIN_PASS = "1234";

// 🔴 販売入力追加
function addSale(){
  const div = document.createElement("div");
  div.className="box";

  div.innerHTML = `
    <input type="text" class="buyer" placeholder="販売先">
    <select class="size">
      <option>SS</option><option>S</option><option>M</option>
      <option>L</option><option>2L</option><option>3L</option><option>規格外</option>
    </select>
    <input type="number" class="weight" placeholder="重量(g)" min="0">
    <input type="number" class="price" placeholder="単価(円/kg)" min="0">
    <button onclick="this.parentNode.remove()">削除</button>
  `;

  document.getElementById("salesArea").appendChild(div);
}

function save(){

  if(!date.value){
    alert("日付入れて");
    return;
  }

  let sales = [];

  document.querySelectorAll("#salesArea > div").forEach(row=>{
    sales.push({
      buyer:row.querySelector(".buyer").value,
      size:row.querySelector(".size").value,
      weight:Number(row.querySelector(".weight").value)||0,
      price:Number(row.querySelector(".price").value)||0
    });
  });

  const d={
    user:user.value || "名無し",
    date:date.value,
    line:line.value,
    temp:Number(temp.value)||0,
    humidity:Number(humidity.value)||0,

    ss:Number(ss.value)||0,
    s:Number(s.value)||0,
    m:Number(m.value)||0,
    l:Number(l.value)||0,
    ll:Number(ll.value)||0,
    lll:Number(lll.value)||0,
    ng:Number(ng.value)||0,

    sales:sales,
    work:work.value
  };

  data.push(d);
  localStorage.setItem("ichigo",JSON.stringify(data));

  document.querySelectorAll("input, textarea").forEach(i=>i.value="");
  document.getElementById("salesArea").innerHTML="";

  alert("保存した");
}

function resetData(){
  if(pass.value !== ADMIN_PASS){
    alert("管理者のみ");
    return;
  }

  if(confirm("全部消す？")){
    localStorage.removeItem("ichigo");
    data=[];
    alert("削除した");
  }
}
</script>

</body>
</html>
